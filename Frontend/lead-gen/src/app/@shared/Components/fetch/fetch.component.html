<h1 style ="color:white;" >Data Pipeline</h1>

<div class="actions">
  <button (click)="runPipeline()" [disabled]="loading">
    {{ loading ? 'Running...' : 'Run Ingestion' }}
  </button>
  <button (click)="loadCompanies()">Fetch Companies</button>
  <button (click)="loadPeople()">Fetch People</button>
</div>

<hr>

<!-- Companies Section -->
<section *ngIf="companies.length > 0" style="background-color: white;">
  <h2>Companies</h2>
  <div *ngFor="let company of companies" class="company-card">
    <h3>{{ company.name || company.company_name }}</h3>
    <ul>
      <li *ngFor="let key of objectKeys(company)">
        <strong>{{ key }}:</strong>
        <ng-container *ngIf="isArray(company[key]); else showValue">
          <ul>
            <li *ngFor="let item of company[key]">{{ item }}</li>
          </ul>
        </ng-container>
        <ng-template #showValue>
          {{ company[key] || 'N/A' }}
        </ng-template>
      </li>
    </ul>
  </div>
</section>

<!-- People Section -->
<section *ngIf="people.length > 0">
  <h2>People</h2>
  <div *ngFor="let person of people" class="person-card">
    <h3>{{ person.full_name || (person.first_name + ' ' + person.last_name) }}</h3>
    <ul>
      <li *ngFor="let key of objectKeys(person)">
        <strong>{{ key }}:</strong>
        <ng-container *ngIf="isArray(person[key]); else showPersonValue">
          <ul>
            <li *ngFor="let item of person[key]">{{ item }}</li>
          </ul>
        </ng-container>
        <ng-template #showPersonValue>
          {{ person[key] || 'N/A' }}
        </ng-template>
      </li>
    </ul>
  </div>
</section>

<!-- Debug Raw Data (optional) -->
