<div class="button-component">
    <app-button
        mat-button="filled"
        class="btn"
        [routerLink]="routerLink"
        [ngClass]="buttonStyleClass"
         (click)="clicked.emit($event)"
    >
    @if(icon){
        <mat-icon>{{icon}}</mat-icon>
    }
    {{buttonText}}</app-button>
    <!--
        <mat-icon *ngIf="icon">{{ icon }}</mat-icon>
        {{ buttonText }}
    </button>
-->
</div>
