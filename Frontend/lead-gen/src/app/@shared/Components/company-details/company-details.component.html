<div *ngIf="companyDetails; else noData" class="company-details-component">
  <div class="cards-container">
    <h2 style="color: var(--color-yellow)">{{companyDetails.name}}</h2>
    <div *ngFor="let section of companySections" class="company-section" style="border: 1px solid white;">
      <h3 style="color: var(--color-yellow)">{{ section.title }}</h3>
      <mat-card >
        <mat-card-content>
          <div *ngFor="let entry of section.entries" style="display:flex; line-height: 1.5em;">
            <b style="color: var(--color-yellow)">{{ entry.key }}:</b>
            <span *ngIf="!isLink(entry.value)" style="color: white">{{ entry.value || 'N/A' }}</span>
            <a *ngIf="isLink(entry.value)" [href]="entry.value" target="_blank">{{ entry.value }}</a>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

  </div>
</div>

<ng-template #noData>
  <p style="color: var(--color-yellow);">No company details available.</p>
</ng-template>
