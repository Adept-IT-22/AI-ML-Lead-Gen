
    <div class="data-card">
        <div 
        class="title"
        [ngStyle]="{'color': color}"
        >{{title}}</div>

        <div 
        class="data"
        [ngStyle]="{'color': color}"
        >{{data}} </div>

        <div
        class="progress-bar"
        [ngStyle]="{'color': color}"
        >
        <mat-icon class="progress-mat-icon">arrow_drop_up</mat-icon>
        <span class="progress-text">"+5 % (vs. LW)"</span>
        </div>
    </div>
