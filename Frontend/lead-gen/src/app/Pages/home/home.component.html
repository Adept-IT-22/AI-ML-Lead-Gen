<nav class="navbar">
  <div class="logo">
    <img src="assets/images/adept.jpg" alt="logo"/>
  </div>
  <ul class="nav-links">
    <li><a routerLink="/">Home</a></li>
    <li><a routerLink="/">Analytics</a></li>
  </ul>
</nav>

<div class="home-component">

    <!--Search Bar-->
    <div class="search-bar">
        <app-search-bar></app-search-bar>
    </div>

    <!--Data Cards-->
    <div class="data-cards">
        <app-data-card
        *ngFor="let stat of stats"
        [title]="stat.title"
        [data]="stat.data"
        [color]="stat.color"
        ></app-data-card>
    </div>

    <div class="lead-filters">
        <app-filter [title]="'BY DATE'" [options]="['Today', 'This Week', 'This Month']"></app-filter>
        <app-filter [title]="'BY SOURCE'"[options]="['Funding', 'Hiring', 'Events']"></app-filter>
        <app-filter [title]="'BY STATUS'" [options]="['Total Leads','MQLs', 'SQLs']"></app-filter>
        <app-filter [title]="'BY SCORE'" [options]="['70s', '80s', '90s']"></app-filter>
    </div>

    <div class="lead-list">
        <app-leads
            [title]="'LEAD LIST'"
            [columns]="leadColumns"
            [data]="leadData"
            [buttons]="['View', 'Update']"
            
        ></app-leads>
    </div>

    <!--Data Feed-->
    <div class="data-feed">
        <app-data-feed
        [title]="'RECENT ACTIVITY'"
        [data]="activity_feed"
        ></app-data-feed>
        
        <app-data-feed
        [title]="'RELEVANT NEWS FEED'"
        [data]="news_feed"
        >
        </app-data-feed>
    </div>        
    <!--Filters-->
    

    <!--Leads Table-->
   
</div>
