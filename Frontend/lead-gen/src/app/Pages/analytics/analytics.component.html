<div class="summary-bar">
    <div class="metric-card">
      <h3>Total Leads:49</h3>
    </div>
    <div class="metric-card">
      <h3>Conversion Rate:12%</h3>
    </div>
    <div class="metric-card">
      <h3>Contacted:10%</h3>
    </div>
    <div class="metric-card">
      <h3>Open Rate:35%</h3>
    </div>
  </div>
<div class="analytics-container grid grid-cols-1 md:grid-cols-2 gap-6 p-6 text-white">
  <!-- 🚀 Summary Metrics Bar -->
  
  <!-- 🔹 Leads by Source (BAR) -->
  <div class="chart-card bg-gray-900 p-4 rounded-2xl shadow">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">Leads by Source</h2>
    <canvas baseChart [data]="sourceChartData" [options]="barOptions" [type]="'bar'"></canvas>
    <p class="mt-3 text-sm text-gray-300">{{ sourceSummary }}</p>
  </div>

  <!-- 🔹 Leads by Status (PIE) -->
  <div class="chart-card bg-gray-900 p-4 rounded-2xl shadow">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">Leads by Status</h2>
    <canvas baseChart [data]="statusChartData" [options]="pieOptions" [type]="'pie'"></canvas>
    <p class="mt-3 text-sm text-gray-300">{{ statusSummary }}</p>
  </div>

  <!-- 🔹 ICP Score Distribution (PIE) -->
  <div class="chart-card bg-gray-900 p-4 rounded-2xl shadow">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">ICP Score Distribution</h2>
    <canvas baseChart [data]="icpChartData" [options]="pieOptions" [type]="'pie'"></canvas>
    <p class="mt-3 text-sm text-gray-300">{{ icpSummary }}</p>
  </div>

  <!-- 🔹 Leads Over Time (LINE) -->
  <div class="chart-card bg-gray-900 p-4 rounded-2xl shadow col-span-1 md:col-span-2">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">Leads Over Time</h2>
    <canvas baseChart [data]="timeChartData" [options]="lineOptions" [type]="'line'"></canvas>
    <p class="mt-3 text-sm text-gray-300">{{ timeSummary }}</p>
  </div>

  <!-- 🔹 Conversion Rate Analysis (BAR) -->
  <div class="chart-card bg-gray-900 p-4 rounded-2xl shadow col-span-1 md:col-span-2">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">Conversion Rate Analysis</h2>
    <canvas baseChart [data]="conversionChartData" [options]="barOptions" [type]="'bar'"></canvas>
    <p class="mt-3 text-sm text-gray-300">{{ conversionSummary }}</p>
  </div>

</div>
