services:
  mock-lead-gen-backend:
    build: 
      context: ./
      dockerfile: backend/dockerfile
    container_name: mock-lead-gen-backend
    ports: 
      - "5050:5050"
    environment:
      FLASK_APP: main.py
      FLASK_RUN_HOST: 0.0.0.0
      POSTGRES_DB: mock_lead_gen_db
      POSTGRES_USER: mock_lead_gen_user
      POSTGRES_PASSWORD: mock_lead_gen_password
      POSTGRES_HOST: mock-lead-gen-db
      POSTGRES_PORT: 5432
    networks:
      - mock-lead-gen-network
    restart: always

networks:
  mock-lead-gen-network:
    external: true